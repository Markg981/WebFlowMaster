# ─── WebFlowMaster Observability Stack ─────────────────────────────────────────
#
# Grafana Loki for log aggregation + Grafana for dashboards and querying.
#
# Usage:
#   docker-compose -f docker-compose.observability.yml up -d
#
# Then:
#   - Grafana UI:  http://localhost:3001  (admin / admin)
#   - Loki API:    http://localhost:3100
#
# In your .env file, set:
#   LOKI_URL=http://localhost:3100
#
# ───────────────────────────────────────────────────────────────────────────────

services:
  # ─── Grafana Loki ─────────────────────────────────────────────────────────
  # Lightweight log aggregation system. Unlike Elasticsearch, Loki only
  # indexes labels (not full-text), making it very memory-efficient (~256MB).
  loki:
    image: grafana/loki:2.9.0
    container_name: wfm-loki
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Grafana ──────────────────────────────────────────────────────────────
  # Visualization and dashboards. Pre-configured with Loki as a datasource.
  grafana:
    image: grafana/grafana:latest
    container_name: wfm-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

volumes:
  loki-data:
  grafana-data:
