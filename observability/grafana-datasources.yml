# Auto-provisioned Grafana datasources for WebFlowMaster
# This file is mounted into Grafana at startup, so Loki is available immediately.

apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: true
    jsonData:
      maxLines: 1000
